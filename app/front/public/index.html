<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>読書ログアプリ</title>
    <link rel="stylesheet" href="/src/css/style.css">
</head>
<body>
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px;">
        <h1 style="margin: 0;">book-metter</h1>
        <button onclick="logout()" style="background-color: #ff4757; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: bold;">ログアウト</button>
    </div>
    
    <div id="user-info">
            <p>ようこそ、<span id="user-name" style="font-weight: bold; color: #4a90e2;">読込中...</span> さん！ (ID: <span id="user-id"></span>)</p>
            <button onclick="fetchBooks()">本の一覧を更新</button>
    </div>

    <div id="add-book-form" style="border: 1px solid #2ecc71; padding: 15px; margin: 10px; border-radius: 8px; background: #eafff2;">
        <h3>📚 新しい本を登録</h3>
            タイトル: <input type="text" id="book-title" placeholder="吾輩は猫である">
            総ページ数: <input type="number" id="book-pages" placeholder="300">
            目標完了日: <input type="date" id="book-target">
        <button onclick="submitNewBook()" style="background-color: #2ecc71;">本を追加する</button>
    </div>

    <div id="book-list">
        </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/src/js/api.js"></script>
    <script src="/src/js/main.js"></script>
</body>
</html>
