<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book-meter - ホーム</title>
    <link rel="stylesheet" href="/src/css/style.css">
    <script src="/src/js/api.js" defer></script>
    <script src="/src/js/main.js" defer></script>
</head>
<body>

<header>
    <div class="logo">
        <a href="/public/index.html" style="text-decoration: none;">
            <h1>📚 Book-meter</h1>
        </a>
    </div>
    <nav class="global-nav">
        <a href="/public/index.html" class="nav-link">ホーム</a>
        <a href="/public/search-book.html" class="nav-link">本を探す</a>
        <a href="/public/search-group.html" class="nav-link">グループを探す</a>
        <a href="/public/bookshelf.html" class="nav-link">自分の本棚を見る</a>
    </nav>
    <div class="user-controls">
        <span id="header-username">読み込み中...</span>
        <button class="header-btn" onclick="logout()">ログアウト</button>
    </div>
</header>

<main>
    <section id="my-groups-section">
        <div class="section-header">
            <h2>📖 参加中のグループ</h2>
            <div class="filter-tabs">
                <button class="filter-btn active" onclick="filterIndexGroups('all')">すべて</button>
                <button class="filter-btn" onclick="filterIndexGroups('unread')">未読</button>
                <button class="filter-btn" onclick="filterIndexGroups('reading')">輪講中</button>
                <button class="filter-btn" onclick="filterIndexGroups('done')">読了</button>
            </div>
        </div>
        <div id="group-list" class="group-list">
            <p style="color:#999; text-align:center; grid-column: 1/-1;">読み込み中...</p>
        </div>
    </section>
</main>

<!-- 進捗記録モーダル -->
<div id="progress-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <span class="modal-close" onclick="closeProgressModal()">✕</span>
        <h3 id="modal-group-name" style="margin-top:0; margin-bottom:20px;"></h3>
        <div class="form-group" style="margin-bottom:15px;">
            <label>ページ範囲</label>
            <div class="progress-input-group">
                <input type="number" id="modal-start" placeholder="開始" min="1">
                <span>〜</span>
                <input type="number" id="modal-end" placeholder="終了" min="1">
                <span>ページ</span>
            </div>
        </div>
        <div class="form-group" style="margin-bottom:20px;">
            <label>メモ（任意）</label>
            <input type="text" id="modal-memo" placeholder="一言メモ"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; font-size:1rem; box-sizing:border-box;">
        </div>
        <button class="btn-record" style="width:100%; padding:12px; font-size:1rem;"
            onclick="submitProgressFromModal()">記録する</button>
    </div>
</div>

</body>
</html>
