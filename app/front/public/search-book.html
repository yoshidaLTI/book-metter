<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book-meter - 本を探す</title>
    <link rel="stylesheet" href="/src/css/style.css">
    <script src="/src/js/api.js" defer></script>
    <script src="/src/js/main.js" defer></script>

</head>
<body>

<header>
    <div class="logo">
        <a href="/public/index.html" style="text-decoration: none;">
            <h1>📚 Book-meter</h1>
        </a>
    </div>
    <nav class="global-nav">
        <a href="/public/index.html" class="nav-link">ホーム</a>
        <a href="/public/search-book.html" class="nav-link">本を探す</a>
        <a href="/public/search-group.html" class="nav-link">グループを探す</a>
        <a href="/public/bookshelf.html" class="nav-link">自分の本棚を見る</a>
    </nav>
    <div class="user-controls">
        <span id="header-username">読み込み中...</span>
        <button class="header-btn" onclick="logout()">ログアウト</button>
    </div>
</header>

<main>
    <section>
        <div class="section-header">
            <h2>🔍 本を検索してグループを作る</h2>
        </div>

        <div class="search-box">
            <select id="search-type" style="padding:12px; border:1px solid #ccc; border-radius:6px; font-size:1rem; background:#fff;">
                <option value="title">タイトル</option>
                <option value="author">著者</option>
            </select>
            <input type="text" id="search-input" placeholder="書名・著者名で検索..." 
                onkeydown="if(event.key==='Enter') runBookSearch()">
            <button class="btn-search" onclick="runBookSearch()">検索</button>
        </div>

        <div id="search-results"></div>
    </section>
</main>
<footer>
    <!-- 本の情報を手入力するためのリンク -->
    <div style="text-align:center; margin-top:30px;">
        <p style="color:#555; font-size:0.9rem; margin-bottom:8px; display:inline" >検索したい本が見つからない場合はこちら</p>
        <button onclick="openCreateBookModal()" style="background:none; border:none; color:#007BFF; padding:0; font-size:0.9rem; cursor:pointer; text-decoration:none;">
    📖 本の情報を手入力してグループを作成する
    </button>  
    </div>
</footer>

<!-- グループ作成モーダル -->
<div id="create-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <span class="modal-close" onclick="closeCreateModal()">✕</span>
        <h3 style="margin-top:0; margin-bottom:5px;">グループを作成する</h3>

        <!-- 選択した本の情報 -->
        <div id="modal-book-info" style="display:flex; gap:12px; align-items:flex-start;
            background:#f4f7f6; border-radius:6px; padding:12px; margin-bottom:20px;">
            <img id="modal-book-cover" src="" alt="書影"
                style="width:50px; height:70px; object-fit:cover; border-radius:4px; flex-shrink:0;">
            <div>
                <div id="modal-book-title" style="font-weight:bold; font-size:0.95rem;"></div>
                <div id="modal-book-author" style="font-size:0.85rem; color:#777; margin-top:3px;"></div>
            </div>
        </div>

        <div class="form-group" style="margin-bottom:15px;">
            <label>総ページ数 <span style="color:red;">*</span></label>
            <input type="number" id="modal-total-pages" placeholder="例: 237" min="1"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;
                font-size:1rem; box-sizing:border-box;">
        </div>

        <div class="form-group" style="margin-bottom:15px;">
            <label>グループ名 <span style="color:red;">*</span></label>
            <input type="text" id="modal-group-name" placeholder="例: リーダブルコード輪読会"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;
                font-size:1rem; box-sizing:border-box;">
        </div>

        <div class="form-group" style="margin-bottom:15px;">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                <input type="checkbox" id="modal-is-lock" onchange="togglePasswordField()">
                <span>🔒 参加にパスワードを設定する</span>
            </label>
        </div>

        <div id="password-field" class="form-group" style="margin-bottom:20px; display:none;">
            <label>パスワード</label>
            <input type="password" id="modal-password" placeholder="パスワードを入力"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;
                font-size:1rem; box-sizing:border-box;">
        </div>

        <button class="btn-record" style="width:100%; padding:12px; font-size:1rem;"
            onclick="submitCreateGroup()">グループを作成する</button>
    </div>
</div>
<!-- 本の情報入力モーダル -->
<div id="create-book-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <span class="modal-close" onclick="closeCreateBookModal()">✕</span>
        <h3 style="margin-top:0; margin-bottom:5px;">本の情報を入力する</h3>

        <div class="form-group" style="margin-bottom:15px;">
            <label>タイトル <span style="color:red;">*</span></label>
            <input type="text" id="modal-book-title-input" placeholder="例: リーダブルコード"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;
                font-size:1rem; box-sizing:border-box;">
        </div>
        <div class="form-group" style="margin-bottom:15px;">
            <label>著者 <span style="color:red;">*</span></label>
            <input type="text" id="modal-book-author-input" placeholder="例: 三好太郎"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;
                font-size:1rem; box-sizing:border-box;">
        </div>
        <div class="form-group" style="margin-bottom:15px;">
            <label>総ページ数 <span style="color:red;">*</span></label>
            <input type="number" id="modal-book-total-pages" placeholder="例: 237" min="1"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;
                font-size:1rem; box-sizing:border-box;">
        </div>

        <div class="form-group" style="margin-bottom:15px;">
            <label>グループ名 <span style="color:red;">*</span></label>
            <input type="text" id="modal-book-group-name" placeholder="例: リーダブルコード輪読会"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;
                font-size:1rem; box-sizing:border-box;">
        </div>

        <div class="form-group" style="margin-bottom:15px;">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                <input type="checkbox" id="modal-book-is-lock" onchange="toggleBookPasswordField()">
                <span>🔒 参加にパスワードを設定する</span>
            </label>
        </div>

        <div id="book-password-field" class="form-group" style="margin-bottom:20px; display:none;">
            <label>パスワード</label>
            <input type="password" id="modal-book-password" placeholder="パスワードを入力"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;
                font-size:1rem; box-sizing:border-box;">
        </div>

        <button class="btn-record" style="width:100%; padding:12px; font-size:1rem;"
            onclick="submitCreateBookGroup()">グループを作成する</button>
    </div>
</div>

</body>
</html>
